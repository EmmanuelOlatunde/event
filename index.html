function StatusPill({status}){
  const cls={new:"s-new",contacted:"s-con",confirmed:"s-cfm",declined:"s-dec"};

  return e("span",{className:`sp ${cls[status]}`},e("span",{className:"sp-dot"}),labels[status]);
}

    )
  );
}

function App(){
  const [page,setPage]=useState("home");
  const [formData,setFormData]=useState({name:"",email:"",phone:"",eventType:"",eventDate:"",budget:"",package:"",notes:""});
  const [errors,setErrors]=useState({});
  const [bookingData,setBookingData]=useState(null);

  const nav=p=>{setPage(p);try{window.parent.document.querySelector("iframe")?.contentWindow?.scrollTo(0,0);}catch(e){}};

  const handleBookPkg=pkg=>{
    setFormData(p=>({...p,package:pkg.name}));
    nav("booking");
  };

  const handleSubmit=()=>{
    const e={};
    if(!formData.name)e.name="Name is required";
    if(!formData.email||!/\S+@\S+\.\S+/.test(formData.email))e.email="Valid email required";
    if(!formData.phone)e.phone="Phone number is required";
    if(!formData.eventType)e.eventType="Please select event type";
    if(!formData.eventDate)e.eventDate="Event date is required";
    if(!formData.budget)e.budget="Please select a budget range";
    if(Object.keys(e).length){setErrors(e);return;}
    setBookingData({...formData});
    nav("confirmation");
  };

  return e("div",null,
    page!=="admin"&&e(Nav,{page,nav}),
    page==="home"&&e(HomePage,{nav}),
    page==="packages"&&e(PackagesPage,{nav,onBook:handleBookPkg}),
    page==="booking"&&e(BookingPage,{nav,formData,setFormData,errors,setErrors,onSubmit:handleSubmit}),
    page==="confirmation"&&e(ConfirmationPage,{nav,bookingData}),
    page==="admin"&&e(AdminPage,{nav})
  );
}

ReactDOM.render(e(App),document.getElementById("app"));
</script>
